name: senseai
description: SenseAI clinical ASD screening pilot application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  http: ^1.2.2
  intl: ^0.20.2

  # Database & Storage
  sqflite: ^2.3.3+2
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2

  # Audio & Speech
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.2

  # Charts & Animations
  fl_chart: ^0.69.0
  confetti: ^0.7.0
  simple_animations: ^5.0.2
  supercharged: ^2.1.1
  pull_to_refresh: ^2.0.0

  # Web & Sharing
  webview_flutter: ^4.9.0
  share_plus: ^10.0.2
  url_launcher: ^6.2.0
  open_file: ^3.5.0

  # Camera & AI
  camera: ^0.11.0+2
  camera_android: ^0.10.9+16
  google_mlkit_face_detection: 0.13.1

  # PDF & Files
  pdf: ^3.11.1
  printing: ^5.13.3
  archive: ^4.0.0

  # Game engine
  flame: ^1.19.0

  # Video upload and playback
  file_picker: ^8.1.2
  video_player: ^2.8.2
  image_picker: ^1.0.7

  # Permissions
  permission_handler: ^11.3.0

  # JSON
  json_annotation: ^4.9.0
  onnxruntime: ^1.4.1

dependency_overrides:
  camera_android_camerax: ^0.6.25+1

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.13
  mockito: ^5.4.4
  mocktail: ^1.0.1

  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/
    - assets/audio/
    - assets/images/
    - assets/games/
    - assets/translations/en.json
    - assets/translations/si.json
    - assets/translations/ta.json
    - assets/logo/
    - assets/logo/bubble/bubble_pop.mp3

  fonts:
    - family: IskoolaPota
      fonts:
        - asset: assets/fonts/IskoolaPota.ttf

    - family: Bamini
      fonts:
        - asset: assets/fonts/Bamini.ttf